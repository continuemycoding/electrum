name: Build binaries

on:
  workflow_dispatch:
  push:

concurrency:
  group: build-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Windows build
        uses: actions/cache@v4
        with:
          path: |
            contrib/build-wine/.cache
          key: windows-build-${{ runner.os }}-${{ hashFiles('contrib/make_libsecp256k1.sh', 'contrib/make_libusb.sh', 'contrib/make_zbar.sh', 'contrib/build-wine/**') }}
          restore-keys: |
            windows-build-${{ runner.os }}-

      - name: Build Docker image
        run: |
          docker build \
            --build-arg UID=$(id -u) \
            -t electrum-wine-builder-img \
            contrib/build-wine

      - name: Build Windows executables
        run: |
          docker run --rm \
            -v "$PWD":/opt/wine64/drive_c/electrum \
            --workdir /opt/wine64/drive_c/electrum/contrib/build-wine \
            electrum-wine-builder-img \
            ./make_win.sh

      - name: Show checksums
        run: sha256sum contrib/build-wine/dist/*.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: contrib/build-wine/dist/*.exe
          if-no-files-found: error
